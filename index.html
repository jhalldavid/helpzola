<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<meta name="description" content="Zola is a lost dog. If you found her, please call or text her people right away. She is microchipped.">
<title>Zola — Help Me Get Home</title>
<style>
  :root {
    --bg: #FBF7F0;
    --card: #FFFFFF;
    --ink: #1F2421;
    --muted: #3F4642;
    --accent: #2E6F5E;
    --accent-press: #245546;
    --ring: #C9D8D0;
    --line: #E4DDD0;
  }
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.45;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 22px 28px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap {
    width: 100%;
    max-width: 460px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .mark {
    width: 56px; height: 56px;
    margin: 0 auto 18px;
    display: block;
    color: var(--accent);
  }
  h1 {
    font-size: clamp(48px, 16vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    margin: 0 0 6px;
    line-height: 1;
    color: var(--ink);
  }
  .sub {
    text-align: center;
    font-size: 19px;
    color: var(--muted);
    margin: 0 0 30px;
    font-weight: 400;
  }
  .calls { display: flex; flex-direction: column; gap: 14px; }
  .call {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    padding: 18px 20px;
    border-radius: 16px;
    transition: background .15s ease;
  }
  .call:active { background: var(--accent-press); }
  .call svg { flex: 0 0 24px; }
  .call .who { display: flex; flex-direction: column; line-height: 1.2; }
  .call .who .name { font-size: 15px; font-weight: 600; opacity: .88; }
  .call .who .num { font-size: 22px; font-weight: 700; letter-spacing: .005em; margin-top: 2px; }
  .chip {
    margin: 26px 0 0;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.45;
  }
  .chip strong { font-weight: 700; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    margin-top: 30px;
  }
  @media (prefers-reduced-motion: reduce) {
    .call { transition: none; }
  }
  a:focus-visible, .call:focus-visible {
    outline: 3px solid var(--ring);
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <main class="wrap">
    <svg class="mark" viewBox="0 0 64 64" fill="currentColor" aria-hidden="true">
      <ellipse cx="32" cy="42" rx="15" ry="12"/>
      <circle cx="14" cy="28" r="6.5"/>
      <circle cx="26" cy="18" r="6.5"/>
      <circle cx="38" cy="18" r="6.5"/>
      <circle cx="50" cy="28" r="6.5"/>
    </svg>

    <h1>Zola</h1>
    <p class="sub">If you found me, please reach my people.</p>

    <div class="calls">
      <a class="call" href="tel:+13035033567" aria-label="Call or text David at 3 0 3, 5 0 3, 3 5 6 7">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span class="who"><span class="name">Call or text David</span><span class="num">(303) 503-3567</span></span>
      </a>
      <a class="call" href="tel:+12143844306" aria-label="Call or text Rebecca at 2 1 4, 3 8 4, 4 3 0 6">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span class="who"><span class="name">Call or text Rebecca</span><span class="num">(214) 384-4306</span></span>
      </a>
    </div>

    <p class="chip"><strong>I'm microchipped.</strong> Any vet or shelter can scan me to find my registration.</p>

    <footer>Thank you for helping me get home.</footer>
  </main>
</body>
</html>
