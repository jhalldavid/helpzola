<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF7F0">
<meta name="description" content="Zola is a lost dog. If you found her, please call or text her people right away. She is microchipped.">
<title>Zola — Help Me Get Home</title>
<style>
  :root {
    --bg: #FBF7F0;
    --card: #FFFFFF;
    --ink: #1F2421;
    --muted: #3F4642;
    --accent: #2E6F5E;
    --accent-press: #245546;
    --ring: #C9D8D0;
    --line: #E4DDD0;
  }
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 22px 40px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .wrap {
    width: 100%;
    max-width: 460px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .mark {
    width: 56px; height: 56px;
    margin: 0 auto 24px;
    display: block;
    color: var(--accent);
  }
  h1 {
    font-size: clamp(48px, 16vw, 64px);
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    margin: 0 0 12px;
    line-height: 1;
    color: var(--ink);
  }
  .sub {
    text-align: center;
    font-size: 18px;
    color: var(--muted);
    margin: 0 0 40px;
    font-weight: 400;
    text-wrap: balance;
  }
  .calls { display: flex; flex-direction: column; gap: 16px; }
  .call {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    padding: 24px 24px;
    border-radius: 18px;
    transition: background .15s ease;
  }
  .call:active { background: var(--accent-press); }
  .call svg { flex: 0 0 28px; width: 28px; height: 28px; }
  .call .who { display: flex; flex-direction: column; line-height: 1.2; }
  .call .who .name { font-size: clamp(15px, 4vw, 17px); font-weight: 600; opacity: .88; }
  .call .who .num { font-size: clamp(26px, 7.5vw, 34px); font-weight: 700; letter-spacing: .005em; margin-top: 6px; }
  .photo {
    display: block;
    width: 100%;
    aspect-ratio: 1 / 1;
    margin: 32px 0 0;
    border-radius: 18px;
    object-fit: cover;
    box-shadow: 0 1px 0 var(--line);
  }
  .chip {
    margin: 40px 0 0;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--accent);
    border-radius: 16px;
    padding: 20px 22px;
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .chip svg {
    flex: 0 0 22px;
    width: 22px;
    height: 22px;
    color: var(--accent);
    margin-top: 2px;
  }
  .chip .lead {
    display: block;
    font-weight: 700;
    margin-bottom: 6px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-top: 48px;
  }
  @media (prefers-reduced-motion: reduce) {
    .call { transition: none; }
  }
  a:focus-visible, .call:focus-visible {
    outline: 3px solid var(--ring);
    outline-offset: 3px;
  }
</style>
</head>
